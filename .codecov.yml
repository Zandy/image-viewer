codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true
    after_n_builds: 1

coverage:
  precision: 2
  round: down
  range: "70...100"
  
  status:
    project:
      default:
        target: 85%
        threshold: 1%
        base: auto
        if_ci_failed: error
        only_pulls: false
        paths: 
          - "src"
        flags: 
          - unittests
        
    patch:
      default:
        target: 85%
        threshold: 1%
        base: auto
        if_ci_failed: error
        only_pulls: true
        paths:
          - "src"

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

ignore:
  # UI layer - visual components
  - "src/app/ui.rs"
  - "src/app/widgets.rs"
  - "src/viewer/render.rs"
  - "**/*_ui.rs"
  - "**/ui/**"
  
  # Main entry
  - "src/main.rs"
  
  # Test files
  - "**/tests/**"
  - "**/*_test.rs"
  - "**/test_*.rs"
  
  # Generated
  - "target/**"
  - "**/generated/**"

flags:
  unittests:
    carryforward: true
    paths:
      - src/
  integration:
    carryforward: true
    paths:
      - src/
      - tests/
